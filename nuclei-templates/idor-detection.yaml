id: idor-basic-detection
info:
  name: IDOR Basic Detection
  author: Security Research Team
  severity: high
  tags:
    - idor
    - access-control

requests:
  - method: GET
    path:
      - /api/users/1/profile
      - /api/orders/1
      - /api/documents/1
      - /api/profile/1
      - /users/1
      - /api/user/1
      - /api/accounts/1
      - /api/resource/1

    matchers:
      - type: status
        status:
          - 200

---

id: idor-query-parameter
info:
  name: IDOR Query Parameter Test
  author: Security Research Team
  severity: high
  tags:
    - idor
    - query-param

requests:
  - method: GET
    path:
      - /api/user?id=1
      - /api/user-data?user_id=1
      - /api/get-data?id=1
      - /api/resource?id=1
      - /data?user_id=1

    matchers:
      - type: status
        status:
          - 200

---

id: idor-post-request
info:
  name: IDOR POST Request Test
  author: Security Research Team
  severity: high
  tags:
    - idor
    - post-method

requests:
  - method: POST
    path: /api/get-data
    headers:
      Content-Type: application/json
    body: '{"user_id": 1}'

    matchers:
      - type: status
        status:
          - 200
          - 201

  - method: POST
    path: /api/fetch
    headers:
      Content-Type: application/json
    body: '{"id": 1}'

    matchers:
      - type: status
        status:
          - 200
          - 201

  - method: POST
    path: /api/resource
    headers:
      Content-Type: application/json
    body: '{"owner_id": 1, "action": "view"}'

    matchers:
      - type: status
        status:
          - 200
          - 201

---

id: idor-header-bypass
info:
  name: IDOR Header Bypass Test
  author: Security Research Team
  severity: high
  tags:
    - idor
    - header-bypass

requests:
  - method: GET
    path: /api/profile
    headers:
      X-User-ID: "1"

    matchers:
      - type: status
        status:
          - 200

  - method: GET
    path: /api/profile
    headers:
      User-Id: "2"

    matchers:
      - type: status
        status:
          - 200

  - method: GET
    path: /api/user-profile
    headers:
      X-Forwarded-User: "1"

    matchers:
      - type: status
        status:
          - 200

  - method: GET
    path: /api/account
    headers:
      X-Original-User: admin

    matchers:
      - type: status
        status:
          - 200

---

id: idor-uuid-test
info:
  name: IDOR UUID Enumeration
  author: Security Research Team
  severity: medium
  tags:
    - idor
    - uuid

requests:
  - method: GET
    path:
      - /api/resources/00000000-0000-0000-0000-000000000001
      - /api/resources/00000000-0000-0000-0000-000000000002
      - /api/v1/resources/00000000-0000-0000-0000-000000000001

    matchers:
      - type: status
        status:
          - 200
          - 206

---

id: idor-path-traversal
info:
  name: IDOR with Path Traversal
  author: Security Research Team
  severity: high
  tags:
    - idor
    - path-traversal

requests:
  - method: GET
    path:
      - /api/users/1/files
      - /api/users/1/../2/files
      - /api/users/1%252f..%252f2/files
      - /API/USERS/1/FILES

    matchers:
      - type: status
        status:
          - 200
          - 202

---

id: idor-privilege-escalation
info:
  name: IDOR Horizontal Privilege Escalation
  author: Security Research Team
  severity: high
  tags:
    - idor
    - privilege-escalation

requests:
  - method: GET
    path:
      - /api/profile/admin
      - /api/profile/root
      - /api/profile/test
      - /api/users/0
      - /api/users/1
      - /api/users/999999

    matchers:
      - type: status
        status:
          - 200
          - 202
          - 206
