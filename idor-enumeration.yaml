id: idor-profile-enumeration
info:
  name: IDOR - User Profile Enumeration
  author: Security Research Team
  severity: high
  description: |
    Detects IDOR through user profile enumeration.
    Tests if all user profiles are accessible regardless of authentication context.
  tags:
    - idor
    - profiles
    - enumeration

requests:
  - raw:
      - |
        GET /profile/1 HTTP/1.1
        Host: {{Hostname}}
        Authorization: Bearer {{auth_token}}
        Accept: application/json
      - |
        GET /profile/2 HTTP/1.1
        Host: {{Hostname}}
        Authorization: Bearer {{auth_token}}
        Accept: application/json
      - |
        GET /profile/999 HTTP/1.1
        Host: {{Hostname}}
        Authorization: Bearer {{auth_token}}
        Accept: application/json
      - |
        GET /user/profile/1 HTTP/1.1
        Host: {{Hostname}}
        Authorization: Bearer {{auth_token}}
        Accept: application/json
      - |
        GET /api/profiles/1 HTTP/1.1
        Host: {{Hostname}}
        Authorization: Bearer {{auth_token}}
        Accept: application/json

    matchers:
      - type: status
        status:
          - 200

    matchers-condition: or

    extractors:
      - type: regex
        part: body
        regex:
          - '"full_name":"([^"]+)"'
          - '"email":"([^"]+)"'
          - '"phone":"([^"]+)"'
          - '"address":"([^"]+)"'
        name: profile_info
